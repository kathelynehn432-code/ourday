<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FDF9F3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="我们的周年倒数">
<title>我们的周年倒数</title>
<link rel="manifest" href="manifest.json">
<!-- inline SVG favicon + apple-touch-icon so we don't need external image files -->
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%23FDF9F3"/><path d="M32 50 C12 36 14 18 26 18 C30 18 32 22 32 22 C32 22 34 18 38 18 C50 18 52 36 32 50 Z" fill="%23D97E5F"/></svg>'>
<link rel="apple-touch-icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180"><rect width="180" height="180" rx="40" fill="%23FDF9F3"/><path d="M90 140 C34 100 40 50 72 50 C82 50 90 62 90 62 C90 62 98 50 108 50 C140 50 146 100 90 140 Z" fill="%23D97E5F"/></svg>'>

<style>
/* ---------- Tokens ---------- */
:root{
  --cream: #FDF9F3;
  --cream-2: #FBF2E8;
  --pink: #F5D3D8;
  --pink-2: #F8E4E7;
  --caramel: #D97E5F;
  --caramel-dk: #B9593C;
  --rose: #B76E79;
  --ink: #3B2A2A;
  --ink-soft: #6B5555;
  --muted: #C9BDB6;
  --shadow: 0 6px 18px rgba(183, 110, 121, 0.18);
  --shadow-sm: 0 2px 6px rgba(183, 110, 121, 0.12);
  --radius: 14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body{
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
               "Microsoft YaHei", "Segoe UI", Roboto, sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  min-height: 100dvh;
  padding: calc(var(--safe-top) + 16px) 16px calc(var(--safe-bot) + 24px);
  overscroll-behavior-y: contain;
  -webkit-tap-highlight-color: transparent;
}

/* tiny drifting background hearts */
body::before{
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle at 10% 20%, rgba(245,211,216,0.35) 0, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(217,126,95,0.12) 0, transparent 50%);
  z-index: -1;
}

/* ---------- Header / Countdown banner ---------- */
header{
  max-width: 560px;
  margin: 0 auto 18px;
  text-align: center;
}
.title{
  font-size: 14px;
  letter-spacing: 0.22em;
  color: var(--rose);
  margin: 0 0 10px;
  text-transform: uppercase;
}
.countdown-card{
  background: linear-gradient(135deg, var(--pink) 0%, var(--pink-2) 100%);
  border-radius: 22px;
  padding: 18px 20px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.countdown-card::after{
  content: "♡";
  position: absolute;
  right: -6px; top: -14px;
  font-size: 90px;
  color: rgba(255,255,255,0.45);
  line-height: 1;
  transform: rotate(14deg);
  pointer-events: none;
}
.countdown-label{
  font-size: 13px;
  color: var(--rose);
  margin-bottom: 4px;
  letter-spacing: 0.08em;
}
.countdown-days{
  font-size: 44px;
  font-weight: 700;
  color: var(--caramel-dk);
  line-height: 1;
  letter-spacing: -0.02em;
}
.countdown-days .unit{
  font-size: 16px;
  font-weight: 500;
  color: var(--rose);
  margin-left: 4px;
  letter-spacing: 0;
}
.countdown-sub{
  margin-top: 6px;
  font-size: 12px;
  color: var(--ink-soft);
}

/* progress dots */
.progress{
  margin: 14px auto 0;
  max-width: 560px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: var(--ink-soft);
}
.progress-bar{
  flex: 1;
  height: 6px;
  background: var(--pink-2);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill{
  height: 100%;
  background: linear-gradient(90deg, var(--caramel) 0%, var(--rose) 100%);
  border-radius: 99px;
  transition: width .6s ease;
}

/* ---------- Grid ---------- */
.grid{
  max-width: 560px;
  margin: 22px auto 0;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 8px;
}
@media (max-width: 520px){
  .grid{ grid-template-columns: repeat(6, 1fr); gap: 7px; }
}
@media (max-width: 380px){
  .grid{ grid-template-columns: repeat(5, 1fr); gap: 6px; }
}

/* ---------- Box (扁平方块) ---------- */
.box{
  position: relative;
  aspect-ratio: 1 / 1;
  border: 1px solid #EFC7CD;
  padding: 0;
  background: #FDE9EC;
  cursor: pointer;
  font-family: inherit;
  outline: none;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s ease, border-color .2s ease, transform .15s ease;
}
.box:active:not(.locked):not(.missed){ transform: scale(0.95); }

.box-day{
  font-size: 18px;
  font-weight: 600;
  color: var(--caramel-dk);
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.box-icon{
  font-size: 26px;
  line-height: 1;
  animation: icon-pop .4s ease-out;
}
@keyframes icon-pop{
  0%   { transform: scale(0.4) rotate(-20deg); opacity: 0; }
  60%  { transform: scale(1.2) rotate(8deg);   opacity: 1; }
  100% { transform: scale(1)   rotate(0deg);   opacity: 1; }
}
@media (max-width: 520px){
  .box-day{ font-size: 15px; }
  .box-icon{ font-size: 22px; }
}
@media (max-width: 380px){
  .box-day{ font-size: 13px; }
  .box-icon{ font-size: 18px; }
}

/* Locked (未来) — 淡奶粉 */
.box.locked{
  background: #FBEEEF;
  border-color: #F0D9DC;
  cursor: not-allowed;
}
.box.locked .box-day{ color: #D4AFB4; }

/* Missed — 稍深一点的奶粉 + 斜线 */
.box.missed{
  background: #F2DADE;
  border-color: #E4C2C7;
  cursor: not-allowed;
}
.box.missed .box-day{ color: #B89094; }
.box.missed::after{
  content: "";
  position: absolute;
  left: 15%; right: 15%; top: 50%;
  height: 1px;
  background: #B89094;
  transform: rotate(-14deg);
  opacity: 0.6;
}

/* Available — 焦糖橘 + 呼吸灯 + 摆动 */
.box.available{
  background: var(--caramel);
  border-color: var(--caramel-dk);
  animation: breathe 2.2s ease-in-out infinite, wiggle 3s ease-in-out infinite;
}
.box.available .box-day{ color: #fff; }
@keyframes breathe{
  0%, 100% { box-shadow: 0 0 0 0 rgba(217,126,95,0.45); }
  50%      { box-shadow: 0 0 0 6px rgba(217,126,95,0.15); }
}
@keyframes wiggle{
  0%, 46%, 54%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(-2deg); }
  52% { transform: rotate(2deg); }
}

/* Opened — 米白 */
.box.opened{
  background: #FFF8F2;
  border-color: #EEDCCF;
}
.box.opened .box-day{ display: none; }

/* Day 68 — 金 */
.box.special{
  background: #F3C94E !important;
  border-color: #B8892A !important;
}
.box.special .box-day{ color: #5B3F0A !important; }
.box.special::before{
  content: "✨";
  position: absolute;
  top: -4px; right: -4px;
  font-size: 12px;
  animation: twinkle 1.6s ease-in-out infinite;
  pointer-events: none;
}
@keyframes twinkle{
  0%, 100% { opacity: 0.4; transform: scale(0.85); }
  50%      { opacity: 1;   transform: scale(1.1); }
}

/* ---------- Next-box timer strip ---------- */
.next-timer{
  max-width: 560px;
  margin: 18px auto 0;
  padding: 12px 16px;
  background: #fff;
  border-radius: 14px;
  box-shadow: var(--shadow-sm);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
  color: var(--ink-soft);
}
.next-timer strong{
  color: var(--caramel-dk);
  font-weight: 600;
}
.next-timer.hidden{ display: none; }

/* Redeem banner when user has a missed-yesterday box to open */
.redeem-banner{
  max-width: 560px;
  margin: 12px auto 0;
  padding: 10px 14px;
  background: linear-gradient(135deg, #FFE8D9 0%, #F8D3C8 100%);
  color: var(--caramel-dk);
  border-radius: 12px;
  font-size: 13px;
  text-align: center;
  box-shadow: var(--shadow-sm);
}
.redeem-banner.hidden{ display: none; }

/* ---------- Modal ---------- */
.modal-backdrop{
  position: fixed; inset: 0;
  background: rgba(59, 42, 42, 0.45);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s ease;
}
.modal-backdrop.open{ opacity: 1; pointer-events: auto; }

.modal{
  background: linear-gradient(180deg, #ffffff 0%, var(--cream-2) 100%);
  border-radius: 28px;
  max-width: 420px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 28px 24px 24px;
  position: relative;
  transform: scale(0.9) translateY(20px);
  transition: transform .35s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 20px 60px rgba(59,42,42,0.25);
}
.modal-backdrop.open .modal{ transform: scale(1) translateY(0); }

.modal-close{
  position: absolute;
  top: 14px; right: 14px;
  width: 34px; height: 34px;
  border: none;
  background: var(--pink-2);
  border-radius: 50%;
  font-size: 18px;
  color: var(--rose);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:active{ transform: scale(0.92); }

.modal-day{
  font-size: 12px;
  letter-spacing: 0.18em;
  color: var(--rose);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.modal-icon{
  font-size: 56px;
  margin: 8px 0 12px;
  line-height: 1;
}
.modal-date{
  font-size: 12px;
  color: var(--ink-soft);
  margin-bottom: 14px;
}
.modal-content{
  font-size: 16px;
  line-height: 1.7;
  color: var(--ink);
  word-break: break-word;
  text-align: left;
  padding: 16px 18px;
  background: rgba(245, 211, 216, 0.25);
  border-radius: 16px;
  border-left: 3px solid var(--caramel);
}
.modal-header-line{
  font-size: 13px;
  color: var(--rose);
  letter-spacing: 0.04em;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px dashed rgba(183,110,121,0.25);
  font-weight: 500;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.modal-body-line{
  white-space: pre-wrap;
  color: var(--ink);
}
.modal-empty{
  color: var(--ink-soft);
  font-style: italic;
  font-size: 14px;
}

/* Unbox animation layer */
.confetti{
  position: fixed;
  left: 50%; top: 50%;
  width: 0; height: 0;
  pointer-events: none;
  z-index: 99;
}
.confetti span{
  position: absolute;
  left: 0; top: 0;
  font-size: 22px;
  animation: confetti-fly 1.1s cubic-bezier(.22,.61,.36,1) forwards;
}
@keyframes confetti-fly{
  0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
  25%  { opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(1) rotate(var(--rot)); opacity: 0; }
}

/* ---------- Footer note ---------- */
footer{
  max-width: 560px;
  margin: 28px auto 0;
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.1em;
}

/* loading state */
.loading{
  max-width: 560px;
  margin: 40px auto;
  text-align: center;
  color: var(--ink-soft);
  font-size: 14px;
}
</style>
</head>
<body>

<header>
  <p class="title">OUR ANNIVERSARY</p>
  <div class="countdown-card">
    <div class="countdown-label">距离我们的一周年还有</div>
    <div class="countdown-days"><span id="anniv-days">--</span><span class="unit">天</span></div>
    <div class="countdown-sub" id="anniv-sub">2026-06-30</div>
  </div>
  <div class="progress">
    <span id="progress-text">0 / 68</span>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
</header>

<div class="redeem-banner hidden" id="redeem-banner">
  🎁 昨天你错过了一颗盒子，今天可以补拆
</div>

<div class="next-timer hidden" id="next-timer">
  <span>下一个盒子将在</span>
  <strong id="next-timer-value">--:--:--</strong>
  <span>后出现</span>
</div>

<main class="grid" id="grid" role="list" aria-label="68 个倒数盒子">
  <div class="loading">加载中…</div>
</main>

<footer>MADE WITH ♡ · 66 DAYS TO FOREVER</footer>

<!-- 预览/调试面板：方便你现在就看到不同状态的样子 -->
<div id="demo-panel" style="position:fixed;bottom:12px;right:12px;z-index:50;background:rgba(255,255,255,0.96);border:1px solid #E8B8BE;border-radius:12px;padding:8px 10px;box-shadow:0 4px 12px rgba(183,110,121,0.25);font-size:12px;color:#6B5555;display:flex;gap:6px;align-items:center;flex-wrap:wrap;max-width:260px">
  <span style="font-weight:600;color:#B9593C">预览</span>
  <button onclick="location.search='?demo=1'"  style="border:none;background:#F5D3D8;color:#6B4141;border-radius:8px;padding:4px 8px;cursor:pointer">Day 1</button>
  <button onclick="location.search='?demo=5'"  style="border:none;background:#F5D3D8;color:#6B4141;border-radius:8px;padding:4px 8px;cursor:pointer">Day 5</button>
  <button onclick="location.search='?demo=34'" style="border:none;background:#F5D3D8;color:#6B4141;border-radius:8px;padding:4px 8px;cursor:pointer">Day 34</button>
  <button onclick="location.search='?demo=68'" style="border:none;background:#E6B84A;color:#6B4B10;border-radius:8px;padding:4px 8px;cursor:pointer">Day 68</button>
  <button onclick="localStorage.clear();location.search=''" style="border:none;background:#EEE;color:#666;border-radius:8px;padding:4px 8px;cursor:pointer">重置</button>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-day">
  <div class="modal">
    <button class="modal-close" id="modal-close" aria-label="关闭">×</button>
    <div class="modal-day" id="modal-day">DAY --</div>
    <div class="modal-icon" id="modal-icon">💝</div>
    <div class="modal-date" id="modal-date"></div>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
  // register service worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(err => {
        console.warn('SW registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
